# EventKit Console — CI (verify only).
#
# Path-filtered to console/** so the library CI (ci.yml) stays independent.
# This repo is open source: it does NOT deploy anywhere. It verifies that both
# builds are green —
#   - the standalone app build (local-dev / self-host path)
#   - the library build that ships as hopdrive-eventkit/console
# A consumer deploys their own wrapper (see console/template); the actual
# publish of the library happens in release.yml via `npm run build:console`.

name: Console CI

on:
  pull_request:
    paths: ['console/**', '.github/workflows/console-ci.yml']
  push:
    branches: [main]
    paths: ['console/**', '.github/workflows/console-ci.yml']

concurrency:
  group: console-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: console

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: console/package-lock.json

      - name: Install
        run: npm ci

      # 186 pre-existing type errors ported from the legacy app (missing
      # vite/client types + legacy looseness). Non-blocking until the Phase C3
      # burn-down; the count is reported so regressions are visible in the log.
      - name: Typecheck (non-blocking, pre-existing debt)
        continue-on-error: true
        run: npx tsc --noEmit 2>&1 | tail -1

      - name: Build standalone app
        run: npm run build

      - name: Build library (hopdrive-eventkit/console)
        run: npm run build:lib

      # Guard the published artifact: the library entry, its stylesheet, and the
      # public types must all be emitted into the root package's dist/console.
      - name: Verify library output
        working-directory: .
        run: |
          for f in dist/console/index.js dist/console/style.css dist/console/index.d.ts; do
            if [ ! -s "$f" ]; then
              echo "::error::missing or empty library artifact: $f"
              exit 1
            fi
          done
          echo "library artifacts present: index.js, style.css, index.d.ts"
