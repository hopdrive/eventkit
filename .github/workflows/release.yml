name: Release

# Changesets-driven release automation (mirrors the sdk repo's publish flow).
#
# On every push to main this runs the changesets action, which does ONE of two
# things depending on whether unreleased changesets exist in .changeset/:
#
#   1. Changesets present  -> open/update a "chore: version packages" PR that
#      consumes them, bumps the version in package.json, and writes CHANGELOG.md.
#      Merging that PR is the human gate on the next release.
#   2. No changesets left (the version PR was just merged) -> run `npm run release`
#      (build + bundle smoke + `changeset publish`) to publish to npm and cut a
#      matching GitHub Release. Versions are never bumped or published by hand.
#
# Auth: npm Trusted Publishing via GitHub OIDC — NO stored npm token. npmjs must
# have a trusted publisher configured for this package pointing at
# `hopdrive/eventkit` + this workflow file (`release.yml`). Because the repo is
# public, publishes also carry build provenance (the "signed on GitHub Actions"
# badge on npm).

on:
  push:
    branches: [main]

# Never let two release runs race the version PR / publish.
concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # commit the version bump, push tags, create releases
      pull-requests: write # open/update the "chore: version packages" PR
      id-token: write # OIDC token for npm Trusted Publishing (no stored secret)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          # No registry-url/token wiring: leaving setup-node's .npmrc unwritten
          # keeps the publish on the OIDC path (an empty _authToken line would
          # shadow trusted publishing). The registry comes from package.json
          # "publishConfig".

      # npm Trusted Publishing (OIDC) + provenance require npm >= 11.5.1; the npm
      # bundled with Node 20 is 10.x, so upgrade before publishing.
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - run: npm ci

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          version: npm run version # `changeset version` — bump + changelog for the PR
          publish: npm run release # build + smoke + `changeset publish`
          title: 'chore: version packages'
          commit: 'chore: version packages'
          createGithubReleases: true
        env:
          # Lets the action open the version PR and create GitHub Releases.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Publish auth is GitHub OIDC (npm Trusted Publishing) — no NPM token.
          # Emit build provenance (repo is public, so it's publicly verifiable).
          NPM_CONFIG_PROVENANCE: 'true'
          HUSKY: '0'
